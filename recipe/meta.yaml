{% set name = "libertem-asi-tpx3" %}
{% set version = "0.3.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/libertem_asi_tpx3-{{ version }}.tar.gz
  sha256: 8bf21357e042c929937a1208c525850764206f446c582b821179151a1bb0eb37

build:
  skip: true  # [py<39]
  script:
    - {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  build:
    - python
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - {{ compiler('cxx') }}
    - rust
  host:
    - python
    - maturin >=1.3.1,<2
    - pip
    - rust
    - numpy >=1.6.1
  run:
    - python
    - opentelemetry-api

test:
  imports:
    - libertem_asi_tpx3
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/LiberTEM/LiberTEM-rs/
  summary: LiberTEM support for ASI TPX3 detectors
  license: MIT
  license_file:
    - LICENSE
    - libertem_asi_tpx3/THIRDPARTY.yml
  description: |
    A Rust+Python library for receiving sparse array
    streams from Amsterdam Scientific Instruments
    CheeTah TPX3 detectors.

extra:
  recipe-maintainers:
    - sk1p
    - uellue
    - matbryan52
